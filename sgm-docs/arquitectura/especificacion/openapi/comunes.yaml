openapi: 3.1.0
info:
  title: SGM — Componentes OpenAPI comunes
  version: 0.1.0
  description: >
    Esquemas transversales referenciados por las specs de módulos.
    Norma: estandares-api.md Parte I §3 (ErrorResponse, ValidationIssue, ValidationErrorResponse), §4, §8.
components:
  securitySchemes:
    bearerPersonas:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Plano personas (Clave Única). P-02 pendiente.
    bearerM2M:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Plano sistemas M2M (OAuth2 client credentials). P-02 pendiente.
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Sort:
      name: sort
      in: query
      schema:
        type: string
    Order:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Severity:
      type: string
      enum: [blocking, advisory]
    ErrorResponse:
      type: object
      required: [error_code, rule, severity]
      description: >
        Error de un solo código (negocio o proveedor). Norma: estandares-api.md §3.1.
      properties:
        error_code:
          type: string
        field:
          type: string
          nullable: true
        rule:
          type: string
        legal_reference:
          type: string
          nullable: true
        severity:
          $ref: '#/components/schemas/Severity'
    ValidationIssue:
      type: object
      required: [error_code, rule, severity]
      description: >
        Una regla de validación fallida (campo o documento). Misma forma que ErrorResponse.
      properties:
        error_code:
          type: string
        field:
          type: string
          nullable: true
        rule:
          type: string
        legal_reference:
          type: string
          nullable: true
        severity:
          $ref: '#/components/schemas/Severity'
    ValidationErrorResponse:
      type: object
      required: [error_code, rule, severity, issues]
      description: >
        Agregado de varias reglas al validar una operación de escritura (submit de formulario).
        HTTP 422 si algún issue es blocking. Norma: estandares-api.md §3.2.
      properties:
        error_code:
          type: string
          enum: [VALIDATION_FAILED]
        field:
          type: string
          nullable: true
          description: Omitir o null cuando hay varios campos en issues.
        rule:
          type: string
        legal_reference:
          type: string
          nullable: true
        severity:
          $ref: '#/components/schemas/Severity'
        issues:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ValidationIssue'
    PaginationMeta:
      type: object
      required: [page, page_size, total_items, total_pages]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
