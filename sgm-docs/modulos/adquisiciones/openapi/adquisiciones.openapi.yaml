openapi: 3.1.0
info:
  title: SGM Adquisiciones API
  version: 0.1.0
  description: Contrato técnico del módulo Adquisiciones (piloto Compra Ágil). Vista funcional en `../contracts.md`. Rutas
    seccionadas por proceso transversal o modalidad; ensambladas aquí como punto de entrada único.
servers:
  - url: https://api.sgm.example/v1
    description: |
      Base URL de producción. Prefijo de tenant en ruta pendiente de resolver multitenancy (**[PENDIENTE P-03]**).
tags:
  - name: expediente
    description: Consultas del expediente y recursos asociados (solo lectura).
  - name: solped
    description: Solicitud de pedido (SOLPED) y trámite presupuestario.
  - name: modalidad-compra
    description: Ratificación de modalidad y vinculación con Mercado Público.
  - name: resolucion-compra-ca
    description: Resolución de compra — Compra Ágil.
  - name: recepcion-conforme
    description: Recepción conforme de bienes y servicios.
  - name: pago
    description: Cruce de 3 vías, devengado, decreto y ejecución de pago.
paths:
  /procurement-cases:
    $ref: ../expediente/openapi.yaml#/paths/~1procurement-cases
  /procurement-cases/{case_id}:
    $ref: ../expediente/openapi.yaml#/paths/~1procurement-cases~1{case_id}
  /procurement-cases/{case_id}/steps:
    $ref: ../expediente/openapi.yaml#/paths/~1procurement-cases~1{case_id}~1steps
  /purchase-requests/{id}:
    $ref: ../expediente/openapi.yaml#/paths/~1purchase-requests~1{id}
  /purchase-orders/{id}:
    $ref: ../expediente/openapi.yaml#/paths/~1purchase-orders~1{id}
  /purchase-requests/{id}/submit:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1submit
  /purchase-requests/{id}/approve:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1approve
  /purchase-requests/{id}/reject:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1reject
  /purchase-requests/{id}/budget-verification:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1budget-verification
  /purchase-requests/{id}/budget-financing-request:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1budget-financing-request
  /purchase-requests/{id}/budget-availability-certificate:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1budget-availability-certificate
  /purchase-requests/{id}/budget-availability-certificate/scanned:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1budget-availability-certificate~1scanned
  /purchase-requests/{id}/budget-pre-commitment:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests~1{id}~1budget-pre-commitment
  /budget-lines/{id}/preview-availability:
    $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1budget-lines~1{id}~1preview-availability
  /procurement-cases/{id}/modality:
    $ref: ../procesos-transversales/2-modalidad-compra/openapi.yaml#/paths/~1procurement-cases~1{id}~1modality
  /modality-decisions/{id}/approve:
    $ref: ../procesos-transversales/2-modalidad-compra/openapi.yaml#/paths/~1modality-decisions~1{id}~1approve
  /modality-decisions/{id}/reject:
    $ref: ../procesos-transversales/2-modalidad-compra/openapi.yaml#/paths/~1modality-decisions~1{id}~1reject
  /procurement-cases/{id}/mp-link:
    $ref: ../procesos-transversales/2-modalidad-compra/openapi.yaml#/paths/~1procurement-cases~1{id}~1mp-link
  /procurement-cases/{id}/quotation-result:
    $ref: ../1. compra-agil/3-resolucion-compra/openapi.yaml#/paths/~1procurement-cases~1{id}~1quotation-result
  /purchase-orders/{id}/sync-accepted:
    $ref: ../1. compra-agil/3-resolucion-compra/openapi.yaml#/paths/~1purchase-orders~1{id}~1sync-accepted
  /procurement-cases/{id}/release-pre-commitment:
    $ref: ../1. compra-agil/3-resolucion-compra/openapi.yaml#/paths/~1procurement-cases~1{id}~1release-pre-commitment
  /purchase-orders/{id}/goods-receipts:
    $ref: ../procesos-transversales/4-recepcion-conforme/openapi.yaml#/paths/~1purchase-orders~1{id}~1goods-receipts
  /goods-receipts/{id}/confirm:
    $ref: ../procesos-transversales/4-recepcion-conforme/openapi.yaml#/paths/~1goods-receipts~1{id}~1confirm
  /goods-receipt-lines/{id}/inventory-entry:
    $ref: ../procesos-transversales/4-recepcion-conforme/openapi.yaml#/paths/~1goods-receipt-lines~1{id}~1inventory-entry
  /goods-receipts/{id}/accrual:
    $ref: ../procesos-transversales/4-recepcion-conforme/openapi.yaml#/paths/~1goods-receipts~1{id}~1accrual
  /purchase-orders/{id}/three-way-match:
    $ref: ../procesos-transversales/5-pago/openapi.yaml#/paths/~1purchase-orders~1{id}~1three-way-match
  /three-way-matches/{id}/accrual:
    $ref: ../procesos-transversales/5-pago/openapi.yaml#/paths/~1three-way-matches~1{id}~1accrual
  /accruals/{id}/payment-decree:
    $ref: ../procesos-transversales/5-pago/openapi.yaml#/paths/~1accruals~1{id}~1payment-decree
  /payment-decrees/{id}/execute:
    $ref: ../procesos-transversales/5-pago/openapi.yaml#/paths/~1payment-decrees~1{id}~1execute
  /purchase-requests:
    get:
      $ref: ../expediente/openapi.yaml#/paths/~1purchase-requests/get
    post:
      $ref: ../procesos-transversales/1-solped/openapi.yaml#/paths/~1purchase-requests/post
  /purchase-orders:
    get:
      $ref: ../expediente/openapi.yaml#/paths/~1purchase-orders/get
    post:
      $ref: ../1. compra-agil/3-resolucion-compra/openapi.yaml#/paths/~1purchase-orders/post
components:
  securitySchemes:
    bearerPersonas:
      $ref: ../../../arquitectura/openapi/comunes.yaml#/components/securitySchemes/bearerPersonas
    bearerM2M:
      $ref: ../../../arquitectura/openapi/comunes.yaml#/components/securitySchemes/bearerM2M
  parameters:
    CaseId:
      name: case_id
      in: path
      required: true
      schema:
        type: string
        example: ADQ-2026-00123
      description: Identificador del expediente (= folio `ADQ-AAAA-NNNNN`).
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: ../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse
          example:
            error_code: UNAUTHENTICATED
            rule: Token de autenticación inválido o ausente
            severity: blocking
    Forbidden:
      description: Sin permisos suficientes.
      content:
        application/json:
          schema:
            $ref: ../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse
          example:
            error_code: FORBIDDEN
            rule: El token no tiene scope suficiente para esta operación
            severity: blocking
    UnprocessableEntity:
      description: Regla de negocio violada.
      content:
        application/json:
          schema:
            $ref: ../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse
    ProcurementCaseNotFound:
      description: Expediente no encontrado.
      content:
        application/json:
          schema:
            $ref: ../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse
          example:
            error_code: PROCUREMENT_CASE_NOT_FOUND
            field: id
            rule: El expediente no existe en el tenant del token
            severity: blocking
    PurchaseRequestNotFound:
      description: SOLPED no encontrada.
      content:
        application/json:
          schema:
            $ref: ../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse
          example:
            error_code: PURCHASE_REQUEST_NOT_FOUND
            field: id
            rule: La solicitud de pedido no existe
            severity: blocking
  schemas:
    ProcurementType:
      type: string
      enum:
        - agile_purchase
        - framework_agreement
        - public_tender
        - direct_procurement
    ProcurementCaseStatus:
      type: string
      enum:
        - in_progress
        - completed
        - cancelled
        - deserted
    CaseStepStatus:
      type: string
      enum:
        - pending
        - in_progress
        - completed
        - omitted
    PurchaseRequestStatus:
      type: string
      enum:
        - draft
        - pending_approval
        - pending_finance
        - quoting_in_progress
        - quote_void
    PurchaseModality:
      type: string
      enum:
        - agile_purchase
        - framework_agreement
        - public_tender
        - direct_procurement
    SignatureMode:
      type: string
      enum:
        - electronic
        - scanned
    EntryMode:
      type: string
      enum:
        - mp_sync
        - manual
    ReceiptType:
      type: string
      enum:
        - physical_good
        - service
    GoodsReceiptStatus:
      type: string
      enum:
        - draft
        - confirmed
        - rejected
        - partially_rejected
    MatchStatus:
      type: string
      enum:
        - matched
        - discrepancy
    PaymentStatus:
      type: string
      enum:
        - pending
        - completed
        - failed
    ProcurementCase:
      type: object
      required:
        - id
        - folio
        - description
        - requesting_unit_id
        - status
        - current_step_id
        - created_at
      properties:
        id:
          type: string
          example: ADQ-2026-00123
        folio:
          type: string
          example: ADQ-2026-00123
        description:
          type: string
        requesting_unit_id:
          type: string
        procurement_type:
          $ref: "#/components/schemas/ProcurementType"
        status:
          $ref: "#/components/schemas/ProcurementCaseStatus"
        current_step_id:
          type: string
        created_at:
          type: string
          format: date-time
        mp_process_id:
          type: string
          nullable: true
        mp_linked_at:
          type: string
          format: date-time
          nullable: true
        mp_process_type:
          type: string
          nullable: true
    ProcurementCaseSummary:
      type: object
      required:
        - id
        - folio
        - description
        - status
        - requesting_unit_id
        - created_at
      properties:
        id:
          type: string
        folio:
          type: string
        description:
          type: string
        procurement_type:
          $ref: "#/components/schemas/ProcurementType"
        status:
          $ref: "#/components/schemas/ProcurementCaseStatus"
        current_step_name:
          type: string
        requesting_unit_id:
          type: string
        created_at:
          type: string
          format: date-time
    CaseStepSummary:
      type: object
      required:
        - id
        - step_number
        - name
        - status
      properties:
        id:
          type: string
        step_number:
          type: number
        name:
          type: string
        status:
          $ref: "#/components/schemas/CaseStepStatus"
        elapsed_display:
          type: string
    ProcurementCaseDetail:
      allOf:
        - $ref: "#/components/schemas/ProcurementCase"
        - type: object
          required:
            - current_step
          properties:
            current_step:
              $ref: "#/components/schemas/CaseStepSummary"
    CaseStep:
      type: object
      required:
        - id
        - procurement_case_id
        - step_number
        - name
        - status
      properties:
        id:
          type: string
        procurement_case_id:
          type: string
        step_number:
          type: number
        name:
          type: string
        status:
          $ref: "#/components/schemas/CaseStepStatus"
        responsible_unit_id:
          type: string
          nullable: true
        responsible_role:
          type: string
          nullable: true
        responsible_user_id:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        elapsed_display:
          type: string
          nullable: true
    PurchaseRequest:
      type: object
      required:
        - id
        - procurement_case_id
        - requesting_unit
        - description
        - justification
        - requested_date
        - purchase_modality
        - status
      properties:
        id:
          type: string
        procurement_case_id:
          type: string
        requesting_unit:
          type: string
        description:
          type: string
        justification:
          type: string
        requested_date:
          type: string
          format: date
        purchase_modality:
          $ref: "#/components/schemas/PurchaseModality"
        founded_resolution_attachment:
          type: string
          format: uuid
          nullable: true
          description: DocumentRef — subida previa vía core POST /documents (plataforma/contracts.md §2.10)
        proposed_budget_line_id:
          type: string
          nullable: true
        proposed_fiscal_year:
          type: integer
          nullable: true
        status:
          $ref: "#/components/schemas/PurchaseRequestStatus"
    PurchaseRequestLine:
      type: object
      required:
        - id
        - purchase_request_id
        - item_description
        - quantity
        - unit_of_measure
        - unit_price
      properties:
        id:
          type: string
        purchase_request_id:
          type: string
        item_description:
          type: string
        quantity:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
        unit_of_measure:
          type: string
        unit_price:
          type: number
          format: double
        price_source:
          type: string
          nullable: true
    PurchaseRequestWithLines:
      allOf:
        - $ref: "#/components/schemas/PurchaseRequest"
        - type: object
          required:
            - lines
          properties:
            lines:
              type: array
              items:
                $ref: "#/components/schemas/PurchaseRequestLine"
    CreatePurchaseRequestRequest:
      type: object
      required:
        - description
        - justification
        - requested_date
        - purchase_modality
        - lines
      properties:
        description:
          type: string
        justification:
          type: string
        requested_date:
          type: string
          format: date
        purchase_modality:
          $ref: "#/components/schemas/PurchaseModality"
        founded_resolution_attachment:
          type: string
          format: uuid
          nullable: true
          description: DocumentRef — subida previa vía core POST /documents (plataforma/contracts.md §2.10)
        proposed_budget_line_id:
          type: string
          nullable: true
        proposed_fiscal_year:
          type: integer
          nullable: true
        lines:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - item_description
              - quantity
              - unit_of_measure
              - unit_price
            properties:
              item_description:
                type: string
              quantity:
                type: number
                format: double
                minimum: 0
                exclusiveMinimum: true
              unit_of_measure:
                type: string
              unit_price:
                type: number
                format: double
    ApprovalDecisionRequest:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum:
            - approved
        comments:
          type: string
    RejectionDecisionRequest:
      type: object
      required:
        - decision
        - comments
      properties:
        decision:
          type: string
          enum:
            - rejected
        comments:
          type: string
    BudgetAvailabilityPreview:
      type: object
      required:
        - available_balance
        - committed_by_others
        - projected_balance
      properties:
        available_balance:
          type: number
          format: double
        committed_by_others:
          type: number
          format: double
        projected_balance:
          type: number
          format: double
    BudgetVerificationRequest:
      type: object
      required:
        - budget_line_id
        - amount
        - fiscal_year
        - decision
      properties:
        budget_line_id:
          type: string
        amount:
          type: number
          format: double
        fiscal_year:
          type: integer
        decision:
          type: string
          enum:
            - confirmed
            - rejected
        comments:
          type: string
    IssueBudgetCertificateRequest:
      type: object
      required:
        - budget_line_id
        - certified_amount
        - fiscal_year
        - signature_mode
      properties:
        budget_line_id:
          type: string
        certified_amount:
          type: number
          format: double
        fiscal_year:
          type: integer
        signature_mode:
          $ref: "#/components/schemas/SignatureMode"
    RegisterScannedBudgetCertificateRequest:
      allOf:
        - $ref: "#/components/schemas/IssueBudgetCertificateRequest"
        - type: object
          required:
            - scanned_certificate_attachment
          properties:
            scanned_certificate_attachment:
              type: string
              format: uuid
              description: DocumentRef — subida previa vía core POST /documents (plataforma/contracts.md §2.10)
    CreateBudgetPreCommitmentRequest:
      type: object
      required:
        - budget_line_id
        - estimated_amount
        - fiscal_year
        - budget_availability_certificate_id
      properties:
        budget_line_id:
          type: string
        estimated_amount:
          type: number
          format: double
        fiscal_year:
          type: integer
        budget_availability_certificate_id:
          type: string
    BudgetAvailabilityCertificate:
      type: object
      required:
        - id
        - procurement_case_id
        - purchase_request_id
        - certificate_number
        - budget_line_id
        - certified_amount
        - fiscal_year
        - status
        - signature_mode
      properties:
        id:
          type: string
        procurement_case_id:
          type: string
        purchase_request_id:
          type: string
        certificate_number:
          type: string
        budget_line_id:
          type: string
        certified_amount:
          type: number
          format: double
        fiscal_year:
          type: integer
        verified_by:
          type: string
          nullable: true
        signed_by:
          type: string
          nullable: true
        signed_at:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        signature_mode:
          $ref: "#/components/schemas/SignatureMode"
    BudgetPreCommitment:
      type: object
      required:
        - id
        - procurement_case_id
        - purchase_request_id
        - budget_availability_certificate_id
        - budget_line_id
        - estimated_amount
        - fiscal_year
        - status
      properties:
        id:
          type: string
        procurement_case_id:
          type: string
        purchase_request_id:
          type: string
        budget_availability_certificate_id:
          type: string
        budget_line_id:
          type: string
        estimated_amount:
          type: number
          format: double
        fiscal_year:
          type: integer
        status:
          type: string
    ConfirmProcurementModalityRequest:
      type: object
      required:
        - selected_modality
      properties:
        selected_modality:
          $ref: "#/components/schemas/ProcurementType"
        catalog_bypass_justification:
          type: string
          nullable: true
        direct_procurement_cause:
          type: string
          nullable: true
    ConfirmProcurementModalityResponse:
      type: object
      required:
        - modality_decision
        - steps
      properties:
        modality_decision:
          $ref: "#/components/schemas/ModalityDecision"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/CaseStep"
    ModalityDecision:
      type: object
      required:
        - id
        - procurement_case_id
        - selected_modality
        - ratified
        - requires_jefatura_approval
      properties:
        id:
          type: string
        procurement_case_id:
          type: string
        selected_modality:
          $ref: "#/components/schemas/ProcurementType"
        ratified:
          type: boolean
        requires_jefatura_approval:
          type: boolean
        decided_by:
          type: string
          nullable: true
        decided_at:
          type: string
          format: date-time
          nullable: true
    ModalityDecisionApproval:
      type: object
      required:
        - id
        - modality_decision_id
        - approver_id
        - decision
        - decision_date
      properties:
        id:
          type: string
        modality_decision_id:
          type: string
        approver_id:
          type: string
        decision:
          type: string
          enum:
            - approved
            - rejected
        decision_date:
          type: string
          format: date-time
    AgileQuoteProcess:
      type: object
      required:
        - id
        - purchase_request_id
      properties:
        id:
          type: string
        purchase_request_id:
          type: string
        deep_link_clicked_at:
          type: string
          format: date-time
          nullable: true
        mp_quote_id:
          type: string
          nullable: true
    QuotationResultInput:
      type: object
      required:
        - selected_provider_rut
        - selected_provider_name
        - offered_amount
        - lowest_price_selected
        - entry_mode
      properties:
        selected_provider_rut:
          type: string
        selected_provider_name:
          type: string
        offered_amount:
          type: number
          format: double
        lowest_price_selected:
          type: boolean
        entry_mode:
          $ref: "#/components/schemas/EntryMode"
    QuotationResult:
      allOf:
        - $ref: "#/components/schemas/QuotationResultInput"
        - type: object
          required:
            - id
            - procurement_case_id
          properties:
            id:
              type: string
            procurement_case_id:
              type: string
    RegisterPurchaseOrderRequest:
      type: object
      required:
        - mp_oc_number
        - provider_rut
        - amount
        - entry_mode
      properties:
        procurement_case_id:
          type: string
        mp_oc_number:
          type: string
        provider_rut:
          type: string
        amount:
          type: number
          format: double
        entry_mode:
          $ref: "#/components/schemas/EntryMode"
    PurchaseOrder:
      type: object
      required:
        - id
        - procurement_case_id
        - purchase_request_id
        - supplier_rut
        - total_amount
        - status
      properties:
        id:
          type: string
        procurement_case_id:
          type: string
        purchase_request_id:
          type: string
        mp_oc_id:
          type: string
          nullable: true
        supplier_rut:
          type: string
        total_amount:
          type: number
          format: double
        selection_justification:
          type: string
          nullable: true
        status:
          type: string
        acceptance_date:
          type: string
          format: date
          nullable: true
        fulfillment_status:
          type: string
          nullable: true
        entry_mode:
          $ref: "#/components/schemas/EntryMode"
    BudgetCommitment:
      type: object
      required:
        - id
        - purchase_order_id
        - budget_pre_commitment_id
        - committed_amount
        - commitment_date
        - source
      properties:
        id:
          type: string
        purchase_order_id:
          type: string
        budget_pre_commitment_id:
          type: string
        committed_amount:
          type: number
          format: double
        commitment_date:
          type: string
          format: date
        source:
          type: string
    SyncPurchaseOrderAcceptedResponse:
      type: object
      required:
        - purchase_order
        - budget_commitment
      properties:
        purchase_order:
          $ref: "#/components/schemas/PurchaseOrder"
        budget_commitment:
          $ref: "#/components/schemas/BudgetCommitment"
    GoodsReceiptLine:
      type: object
      required:
