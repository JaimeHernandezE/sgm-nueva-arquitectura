openapi: 3.1.0

info:
  title: SGM Adquisiciones API
  version: 0.1.0
  description: >
    Contrato técnico del módulo Adquisiciones (piloto Compra Ágil).
    Vista funcional en `../contracts.md`. Estándares transversales en
    `../../../arquitectura/estandares-api.md`.

servers:
  - url: https://api.sgm.example/v1
    description: >
      Base URL de producción. Prefijo de tenant en ruta pendiente de resolver
      multitenancy (**[PENDIENTE P-03]**).

tags:
  - name: expediente
    description: Consultas del expediente y recursos asociados (solo lectura).
  - name: solped
    description: Solicitud de pedido (SOLPED) y trámite presupuestario.
  - name: modalidad-compra
    description: Ratificación de modalidad y vinculación con Mercado Público.
  - name: resolucion-compra-ca
    description: Resolución de compra — Compra Ágil.
  - name: recepcion-conforme
    description: Recepción conforme de bienes y servicios.
  - name: pago
    description: Cruce de 3 vías, devengado, decreto y ejecución de pago.

paths:
  /procurement-cases:
    get:
      operationId: listProcurementCases
      tags: [expediente]
      summary: Listar expedientes de compra
      description: >
        Consulta paginada de expedientes. Solo lectura; sin efectos colaterales.
        Requiere scope `adquisiciones:read` (personas) o `adquisiciones.read` (M2M).
      x-subpasos: []
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/Page'
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/PageSize'
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/Sort'
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/Order'
        - name: procurement_type
          in: query
          schema:
            $ref: '#/components/schemas/ProcurementType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProcurementCaseStatus'
        - name: requesting_unit_id
          in: query
          schema:
            type: string
        - name: folio
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Colección paginada de expedientes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProcurementCaseSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /procurement-cases/{case_id}:
    get:
      operationId: getProcurementCase
      tags: [expediente]
      summary: Obtener detalle de expediente
      description: Vista de expediente con paso actual resumido.
      x-subpasos: []
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        '200':
          description: Detalle del expediente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcurementCaseDetail'
              examples:
                ProcurementCaseAgile:
                  $ref: '#/components/examples/ProcurementCaseAgile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Expediente no encontrado.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              example:
                error_code: PROCUREMENT_CASE_NOT_FOUND
                field: case_id
                rule: El expediente no existe en el tenant del token
                severity: blocking

  /procurement-cases/{case_id}/steps:
    get:
      operationId: listProcurementCaseSteps
      tags: [expediente]
      summary: Listar pasos del expediente
      description: Timeline de pasos ordenados por `step_number`.
      x-subpasos: []
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/CaseId'
      responses:
        '200':
          description: Pasos del expediente.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaseStep'
              examples:
                ProcurementCaseStepsAgile:
                  $ref: '#/components/examples/ProcurementCaseStepsAgile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Expediente no encontrado.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              example:
                error_code: PROCUREMENT_CASE_NOT_FOUND
                field: case_id
                rule: El expediente no existe en el tenant del token
                severity: blocking

  /purchase-requests:
    get:
      operationId: listPurchaseRequests
      tags: [expediente]
      summary: Listar solicitudes de pedido
      description: Consulta paginada de SOLPED.
      x-subpasos: []
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/Page'
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/PageSize'
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/Sort'
        - $ref: '../../../arquitectura/openapi/comunes.yaml#/components/parameters/Order'
        - name: procurement_case_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Colección paginada de SOLPED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPurchaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createPurchaseRequest
      tags: [solped]
      summary: Crear solicitud de pedido
      description: >
        Registra una SOLPED en estado borrador. Valida campos obligatorios,
        cantidades, referencia de precio y resolución fundada si aplica.
      x-subpasos: ['1.1']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseRequestRequest'
      responses:
        '201':
          description: SOLPED creada en estado borrador.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseRequest'
              examples:
                CreatePurchaseRequestSuccess:
                  $ref: '#/components/examples/CreatePurchaseRequestSuccess'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                missingFields:
                  value:
                    error_code: MISSING_REQUIRED_FIELDS
                    rule: Faltan campos obligatorios de la SOLPED
                    severity: blocking
                invalidQuantity:
                  value:
                    error_code: INVALID_QUANTITY
                    field: lines[0].quantity
                    rule: La cantidad debe ser mayor a cero
                    severity: blocking
                priceReference:
                  value:
                    error_code: PRICE_REFERENCE_UNAVAILABLE
                    rule: No hay referencia de precio disponible para la línea
                    severity: blocking
                priceDeviation:
                  value:
                    error_code: PRICE_DEVIATION_EXCEEDED
                    rule: La desviación de precio excede la tolerancia permitida
                    severity: blocking
                foundedResolution:
                  value:
                    error_code: FOUNDED_RESOLUTION_REQUIRED
                    field: founded_resolution_attachment
                    rule: Trato directo requiere resolución fundada adjunta
                    severity: blocking

  /purchase-requests/{id}:
    get:
      operationId: getPurchaseRequest
      tags: [expediente]
      summary: Obtener detalle de SOLPED
      description: SOLPED con sus líneas de detalle.
      x-subpasos: []
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Detalle de SOLPED con líneas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseRequestWithLines'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: SOLPED no encontrada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              example:
                error_code: PURCHASE_REQUEST_NOT_FOUND
                field: id
                rule: La solicitud de pedido no existe
                severity: blocking

  /purchase-requests/{id}/submit:
    post:
      operationId: submitPurchaseRequest
      tags: [solped]
      summary: Enviar SOLPED a aprobación
      description: >
        Transiciona SOLPED completa a `pending_approval`. Exige resolución fundada
        si `purchase_modality = direct_procurement`.
      x-subpasos: ['1.1']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: SOLPED enviada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              example:
                error_code: FOUNDED_RESOLUTION_REQUIRED
                field: founded_resolution_attachment
                rule: Trato directo requiere resolución fundada adjunta
                severity: blocking

  /purchase-requests/{id}/approve:
    post:
      operationId: approvePurchaseRequest
      tags: [solped]
      summary: Aprobar SOLPED
      description: >
        Aprueba la SOLPED con firma electrónica válida. Emite evento
        `PurchaseRequestApproved`.
      x-subpasos: ['1.2']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      responses:
        '200':
          description: SOLPED aprobada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                signatureRequired:
                  value:
                    error_code: SIGNATURE_REQUIRED
                    rule: Se requiere firma electrónica válida (FirmaGob)
                    severity: blocking
                unauthorizedApprover:
                  value:
                    error_code: UNAUTHORIZED_APPROVER
                    rule: Solo el aprobador de jefatura de la unidad solicitante puede aprobar
                    severity: blocking

  /purchase-requests/{id}/reject:
    post:
      operationId: rejectPurchaseRequest
      tags: [solped]
      summary: Rechazar SOLPED
      description: Rechaza la SOLPED; `comments` obligatorio. Retorna a `draft`.
      x-subpasos: ['1.2']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectionDecisionRequest'
      responses:
        '200':
          description: SOLPED rechazada y devuelta a borrador.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /purchase-requests/{id}/budget-verification:
    post:
      operationId: verifyBudgetAvailability
      tags: [solped]
      summary: Verificar disponibilidad presupuestaria
      description: >
        Confirma o rechaza disponibilidad presupuestaria (sub-paso 1.3).
        Invoca `checkBudgetAvailability` en Presupuestos.
      x-subpasos: ['1.3']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BudgetVerificationRequest'
      responses:
        '200':
          description: Verificación registrada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAvailabilityPreview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                budgetUnavailable:
                  $ref: '#/components/examples/BudgetUnavailableError'
                invalidStatus:
                  value:
                    error_code: INVALID_STATUS
                    rule: La SOLPED debe estar en estado pending_finance
                    severity: blocking

  /purchase-requests/{id}/budget-financing-request:
    post:
      operationId: requestBudgetFinancing
      tags: [solped]
      summary: Solicitar financiamiento presupuestario
      description: >
        Paso optativo (1.4). Emite evento `BudgetFinancingRequested`; no avanza
        el ciclo principal hasta resolución externa.
      x-subpasos: ['1.4']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [justification]
              properties:
                justification:
                  type: string
      responses:
        '202':
          description: Solicitud de financiamiento registrada.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /purchase-requests/{id}/budget-availability-certificate:
    post:
      operationId: issueBudgetAvailabilityCertificate
      tags: [solped]
      summary: Emitir certificado de disponibilidad presupuestaria
      description: >
        Emite CDP firmado (modo electrónico o escaneado). Emite evento
        `BudgetAvailabilityCertificateIssued`.
      x-subpasos: ['1.5']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueBudgetCertificateRequest'
      responses:
        '201':
          description: CDP emitido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAvailabilityCertificate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                verificationRequired:
                  value:
                    error_code: VERIFICATION_REQUIRED
                    rule: Debe existir verificación confirmada en sub-paso 1.3
                    severity: blocking
                segregation:
                  value:
                    error_code: SEGREGATION_OF_DUTIES_VIOLATION
                    rule: El verificador no puede ser el firmante del CDP
                    severity: blocking
                budgetUnavailable:
                  $ref: '#/components/examples/BudgetUnavailableError'
                signatureRequired:
                  value:
                    error_code: SIGNATURE_REQUIRED
                    rule: Se requiere firma electrónica válida (FirmaGob)
                    severity: blocking
                scannedInvalid:
                  value:
                    error_code: SCANNED_CDP_INVALID
                    rule: El adjunto escaneado del CDP no es válido
                    severity: blocking

  /purchase-requests/{id}/budget-availability-certificate/scanned:
    post:
      operationId: registerScannedBudgetAvailabilityCertificate
      tags: [solped]
      summary: Registrar CDP escaneado
      description: >
        Modo degradado de emisión de CDP (1.5). Fija `signature_mode = scanned`.
      x-subpasos: ['1.5']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterScannedBudgetCertificateRequest'
      responses:
        '201':
          description: CDP escaneado registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAvailabilityCertificate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                budgetUnavailable:
                  $ref: '#/components/examples/BudgetUnavailableError'
                scannedInvalid:
                  value:
                    error_code: SCANNED_CDP_INVALID
                    rule: El adjunto escaneado del CDP no es válido
                    severity: blocking

  /purchase-requests/{id}/budget-pre-commitment:
    post:
      operationId: createBudgetPreCommitment
      tags: [solped]
      summary: Crear preobligación presupuestaria
      description: >
        Registra preobligación tras CDP vigente (1.6). Emite evento
        `BudgetPreCommitmentCreated`.
      x-subpasos: ['1.6']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBudgetPreCommitmentRequest'
      responses:
        '201':
          description: Preobligación creada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetPreCommitment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/PurchaseRequestNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                cdpRequired:
                  value:
                    error_code: CDP_REQUIRED
                    rule: Se requiere CDP vigente
                    severity: blocking
                budgetUnavailable:
                  $ref: '#/components/examples/BudgetUnavailableError'
                invalidStatus:
                  value:
                    error_code: INVALID_STATUS
                    rule: La SOLPED debe estar en estado pending_finance
                    severity: blocking

  /budget-lines/{id}/preview-availability:
    get:
      operationId: previewBudgetAvailability
      tags: [solped]
      summary: Autoconsulta informativa de saldo
      description: >
        Consulta informativa de disponibilidad presupuestaria. No persiste ni
        afecta el estado de la SOLPED. Requiere RBAC de consulta sobre la línea.
      x-subpasos: ['1.1', '1.2']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Identificador de línea presupuestaria.
        - name: fiscal_year
          in: query
          required: true
          schema:
            type: integer
        - name: amount
          in: query
          description: Monto estimado de la SOLPED (opcional).
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Proyección de saldo disponible.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetAvailabilityPreview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /procurement-cases/{id}/modality:
    post:
      operationId: confirmProcurementModality
      tags: [modalidad-compra]
      summary: Confirmar modalidad de compra
      description: >
        Ratifica o selecciona modalidad (gateway V1–V8). Instancia pasos del
        expediente. Emite evento `ProcurementModalityConfirmed`.
      x-subpasos: ['2.1']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Identificador del expediente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmProcurementModalityRequest'
      responses:
        '200':
          description: Modalidad confirmada e instancia de pasos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmProcurementModalityResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/ProcurementCaseNotFound'
        '422':
          description: Regla de negocio violada.
          content:
            application/json:
              schema:
                $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
              examples:
                modalityAmountExceeded:
                  value:
                    error_code: MODALITY_AMOUNT_EXCEEDED
                    rule: El monto excede 100 UTM para Compra Ágil
                    severity: blocking
                frameworkFirst:
                  value:
                    error_code: FRAMEWORK_AGREEMENT_FIRST_OPTION
                    rule: El catálogo de Convenio Marco es la primera opción sin justificación
                    severity: blocking
                directCause:
                  value:
                    error_code: DIRECT_PROCUREMENT_CAUSE_REQUIRED
                    rule: Trato directo requiere causal y resolución fundada
                    severity: blocking
                alreadyConfirmed:
                  value:
                    error_code: MODALITY_ALREADY_CONFIRMED
                    rule: La modalidad ya fue confirmada
                    severity: blocking
                utmUnavailable:
                  value:
                    error_code: UTM_VALUE_UNAVAILABLE
                    rule: No fue posible obtener el valor UTM vigente
                    severity: blocking

  /modality-decisions/{id}/approve:
    post:
      operationId: approveModalityDecision
      tags: [modalidad-compra]
      summary: Aprobar decisión de modalidad
      description: >
        Aprobación condicionada a `requires_jefatura_approval` (**[PENDIENTE P-38]**).
        Emite evento `ProcurementModalityApproved`.
      x-subpasos: ['2.2']
      security:
        - bearerPersonas: []
        - bearerM2M: []
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comments:
                  type: string
      responses:
        '200':
          description: Aprobación registrada.
          content:
            application/json:
