components:
  securitySchemes:
    bearerPersonas:
      $ref: '../../../arquitectura/openapi/comunes.yaml#/components/securitySchemes/bearerPersonas'
    bearerM2M:
      $ref: '../../../arquitectura/openapi/comunes.yaml#/components/securitySchemes/bearerM2M'

  parameters:
    CaseId:
      name: case_id
      in: path
      required: true
      schema:
        type: string
        example: ADQ-2026-00123
      description: Identificador del expediente (= folio `ADQ-AAAA-NNNNN`).
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string

  responses:
    Unauthorized:
      description: No autenticado.
      content:
        application/json:
          schema:
            $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
          example:
            error_code: UNAUTHENTICATED
            rule: Token de autenticación inválido o ausente
            severity: blocking
    Forbidden:
      description: Sin permisos suficientes.
      content:
        application/json:
          schema:
            $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
          example:
            error_code: FORBIDDEN
            rule: El token no tiene scope suficiente para esta operación
            severity: blocking
    UnprocessableEntity:
      description: Regla de negocio violada.
      content:
        application/json:
          schema:
            $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
    ProcurementCaseNotFound:
      description: Expediente no encontrado.
      content:
        application/json:
          schema:
            $ref: '../../../arquitectura/openapi/comunes.yaml#/components/schemas/ErrorResponse'
          example:
            error_code: PROCUREMENT_CASE_NOT_FOUND
            field: id
            rule: El expediente no existe en el tenant del token
            severity: blocking
    PurchaseRequestNotFound:
      description: SOLPED no encontrada.
      content:
