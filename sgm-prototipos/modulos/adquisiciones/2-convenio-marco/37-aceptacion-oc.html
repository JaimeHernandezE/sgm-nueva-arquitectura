<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.7 — Emisión y aceptación de la OC</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>
    <!-- Operaciones: syncPurchaseOrderAccepted, commitBudget -->

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00089 — Emisión y aceptación de la OC</span>
        <span class="badge badge--active" id="header-badge">Aceptada</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Aceptación de la OC</h3>
          <div class="info-panel"><strong>Hito contable — lectura MP confirmada</strong><br />OC N° 4021-88-OC26 · Mobiliario Chile Ltda. · $ 4.650.000<br />commitBudget por monto real · avance a recepción conforme.</div>
        </section>
      </div>
      <div class="form-actions">
        <a class="btn btn--secondary" id="back-link" href="#">Volver al expediente</a>
        <button class="btn btn--primary" type="button" id="confirm">Confirmar (demo)</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, renderOriginBanner, demoAction, initStepSimulation } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra',
      stepName: 'Emisión y aceptación de la OC',
      stepId: '3.7',
    });
    initStepSimulation({ stepId: '3.7' });

    document.getElementById('origin-banner').innerHTML = renderOriginBanner({
      kind: 'external',
      label: 'Mercado Público',
      mode: 'solo lectura',
    });

    document.getElementById('back-link').href = getExpedienteUrl(expedienteId);
    document.getElementById('confirm').addEventListener('click', () => {
      demoAction('syncPurchaseOrderAccepted');
      document.getElementById('header-badge').textContent = 'Registrado (demo)';
    });
  </script>
</body>
</html>
