<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.8 — Rechazo de la OC</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>
    

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00089 — Rechazo de la OC</span>
        <span class="badge badge--active" id="header-badge">Camino alternativo</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Contexto del rechazo</h3>
          <div class="banner banner--info">Excluyente con 3.7. Decisión: siguiente proveedor del catálogo / oferente, o republicar (nuevo mp_process_id, mismo folio).</div>
        </section>

        <section class="form-section">
          <h3 class="form-section__title">Decisión <span class="required">*</span></h3>
          <div class="form-row"><label>Decisión <span class="required">*</span></label><select><option>Emitir OC a siguiente proveedor</option><option>Republicar proceso MP</option></select></div>
        </section>
      </div>
      <div class="form-actions">
        <a class="btn btn--secondary" id="back-link" href="#">Volver al expediente</a>
        <button class="btn btn--primary" type="button" id="confirm">Confirmar (demo)</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, renderOriginBanner, demoAction } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra',
      stepName: 'Rechazo de la OC',
      stepId: '3.8',
    });

    document.getElementById('origin-banner').innerHTML = renderOriginBanner({
      kind: 'external',
      label: 'Mercado Público',
      mode: 'solo lectura',
    });

    document.getElementById('back-link').href = getExpedienteUrl(expedienteId);
    document.getElementById('confirm').addEventListener('click', () => {
      demoAction('demo');
      document.getElementById('header-badge').textContent = 'Registrado (demo)';
    });
  </script>
</body>
</html>
