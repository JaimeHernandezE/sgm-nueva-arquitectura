<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.3 — Publicación de Intención de Compra / Gran Compra</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>
    <!-- Operaciones: linkMpProcess -->

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00089 — Publicación de Intención de Compra / Gran Compra</span>
        <span class="badge badge--active" id="header-badge">Hecho</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Intención de Compra en MP</h3>
          <div class="form-row"><label>ID Intención de Compra <span class="required">*</span></label><input type="text" value="4021-88-IC26" /></div>
          <div class="form-row"><label>Fecha publicación</label><input type="text" value="14-03-2026" readonly /></div>
          <div class="form-row"><label>Fecha límite (10 días corridos)</label><input type="text" value="24-03-2026" readonly /></div>
          <div class="info-panel">Vinculación MP diferida (tipo gran_compra_intent). Timer sobre purchase_intent_deadline.</div>
        </section>
      </div>
      <div class="form-actions">
        <a class="btn btn--secondary" id="back-link" href="#">Volver al expediente</a>
        <button class="btn btn--primary" type="button" id="confirm">Confirmar (demo)</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, renderOriginBanner, demoAction, demoValidation, initStepSimulation } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra',
      stepName: 'Publicación de Intención de Compra / Gran Compra',
      stepId: '3.3',
    });
    initStepSimulation({ stepId: '3.3' });

    document.getElementById('origin-banner').innerHTML = renderOriginBanner({
      kind: 'external',
      label: 'Mercado Público',
      mode: 'solo lectura',
    });

    document.getElementById('back-link').href = getExpedienteUrl(expedienteId);
    document.getElementById('confirm').addEventListener('click', () => {
      demoValidation('linkMpProcess');
      document.getElementById('header-badge').textContent = 'Registrado (demo)';
    });
  </script>
</body>
</html>
