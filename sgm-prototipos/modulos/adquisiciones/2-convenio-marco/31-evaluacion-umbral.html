<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.1 — Evaluación de umbral y determinación de ruta</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>
    <!-- Operaciones: getUtmValue -->

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00089 — Evaluación de umbral y determinación de ruta</span>
        <span class="badge badge--active" id="header-badge">Automático</span>
      </div>
      <div class="form-card__body">
        <div class="info-panel"><strong>Compuerta automática</strong><br />Monto estimado: $ 4.800.000 · Umbral Gran Compra: 1.000 UTM (NormativeParameter)</div>
        <div class="form-row"><label>Ruta determinada</label><input type="text" value="gran_compra" readonly /></div>
        <div class="form-row"><label>UTM mes emisión (CLP)</label><input type="text" value="68.017" readonly /></div>
        <div class="banner banner--info">Monto ≥ 1.000 UTM → Gran Compra (Art. 90 D.S. 661/2024). Evento: ProcurementRouteDecided.</div>
      </div>
      <div class="form-actions">
        <a class="btn btn--secondary" id="back-link" href="#">Volver al expediente</a>
        <button class="btn btn--primary" type="button" id="confirm">Confirmar (demo)</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, renderOriginBanner, demoAction } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra',
      stepName: 'Evaluación de umbral y determinación de ruta',
      stepId: '3.1',
    });

    document.getElementById('origin-banner').innerHTML = '';

    document.getElementById('back-link').href = getExpedienteUrl(expedienteId);
    document.getElementById('confirm').addEventListener('click', () => {
      demoAction('getUtmValue');
      document.getElementById('header-badge').textContent = 'Registrado (demo)';
    });
  </script>
</body>
</html>
