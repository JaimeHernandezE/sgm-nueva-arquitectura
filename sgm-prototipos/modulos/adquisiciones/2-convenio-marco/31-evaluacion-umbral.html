<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.1 — Evaluación de umbral y determinación de ruta</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00089 — Evaluación de umbral y determinación de ruta</span>
        <span class="badge badge--active" id="header-badge">Compuerta automática</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Determinación de ruta</h3>
          <div class="info-panel">
            <strong>Monto estimado (de la SOLPED / preobligación) — solo lectura</strong><br />
            $ 80.000.000
          </div>
          <div class="form-row">
            <label>Valor UTM del mes en curso <em>(solo demo — simula caída de fuente)</em></label>
            <select id="simulate-utm">
              <option value="ok" selected>Disponible — $ 65.084</option>
              <option value="unavailable">No disponible / sin caché del mes</option>
            </select>
          </div>
          <div class="info-panel" id="utm-panel">
            Equivalente en UTM: <strong id="utm-equiv">1.229,30 UTM</strong> · Umbral Gran Compra (<code>NormativeParameter</code>): 1.000 UTM
          </div>
        </section>

        <div class="banner hidden" id="result-banner"></div>
        <div class="info-panel hidden" id="next-step-panel">
          <span id="next-step-text"></span>
          <a class="btn btn--primary" id="next-step-link" href="#" style="margin-left:8px;">Continuar</a>
        </div>
      </div>
      <div class="form-actions">
        <span></span>
        <button class="btn btn--primary" type="button" id="evaluate">Evaluar umbral</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, relativeFormHref, renderBreadcrumb, demoAction, initStepSimulation } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra',
      stepName: 'Evaluación de umbral y determinación de ruta',
      stepId: '3.1',
    });
    initStepSimulation({ stepId: '3.1' });
    document.getElementById('origin-banner').innerHTML = '';

    const MONTO = 80000000;
    const UTM_VALUE = 65084;
    const GRAN_COMPRA_LIMIT_UTM = 1000;

    const simulateUtm = document.getElementById('simulate-utm');
    const utmPanel = document.getElementById('utm-panel');
    const utmEquivEl = document.getElementById('utm-equiv');
    const resultBanner = document.getElementById('result-banner');
    const nextStepPanel = document.getElementById('next-step-panel');
    const nextStepText = document.getElementById('next-step-text');
    const nextStepLink = document.getElementById('next-step-link');
    const evaluateBtn = document.getElementById('evaluate');

    function updateUtmPreview() {
      if (simulateUtm.value === 'unavailable') {
        utmPanel.classList.add('hidden');
        return;
      }
      utmPanel.classList.remove('hidden');
      const montoUtm = MONTO / UTM_VALUE;
      utmEquivEl.textContent = `${montoUtm.toFixed(2)} UTM`;
    }
    simulateUtm.addEventListener('change', updateUtmPreview);
    updateUtmPreview();

    evaluateBtn.addEventListener('click', () => {
      resultBanner.classList.remove('hidden');
      resultBanner.className = 'banner';

      if (simulateUtm.value === 'unavailable') {
        resultBanner.style.color = '#a33333';
        resultBanner.textContent = 'UTM_VALUE_UNAVAILABLE — fuente UTM no disponible y sin valor cacheado del mes en curso; la evaluación de umbral no puede ejecutarse.';
        return;
      }

      demoAction('getUtmValue');
      const montoUtm = MONTO / UTM_VALUE;
      const route = montoUtm >= GRAN_COMPRA_LIMIT_UTM ? 'gran_compra' : 'compra_directa';
      demoAction('ProcurementRouteDecided');

      resultBanner.classList.add('banner--info');
      resultBanner.textContent = route === 'gran_compra'
        ? `Ruta determinada: Gran Compra (${montoUtm.toFixed(2)} UTM ≥ 1.000 UTM). Evento ProcurementRouteDecided emitido.`
        : `Ruta determinada: Compra Directa por Catálogo (${montoUtm.toFixed(2)} UTM < 1.000 UTM). Evento ProcurementRouteDecided emitido.`;
      document.getElementById('header-badge').textContent = route === 'gran_compra' ? 'Ruta: Gran Compra' : 'Ruta: Compra Directa';
      evaluateBtn.disabled = true;
      simulateUtm.disabled = true;

      nextStepText.textContent = route === 'gran_compra'
        ? 'Continúa a 3.3 (Publicación de Intención de Compra / Gran Compra).'
        : 'Continúa a 3.2 (Compra Directa por Catálogo).';
      nextStepLink.href = relativeFormHref(route === 'gran_compra' ? '33-intencion-gran-compra.html' : '32-compra-directa-catalogo.html');
      nextStepPanel.classList.remove('hidden');
    });
  </script>
</body>
</html>
