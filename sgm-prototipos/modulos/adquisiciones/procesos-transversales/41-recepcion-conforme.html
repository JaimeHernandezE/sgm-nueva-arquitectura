<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4.1 — Recepción conforme</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>

    <div class="form-card">
      <div class="form-card__header">
        <span>OC #5678 — Recepción conforme</span>
        <span class="badge badge--active">Borrador</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Datos de recepción</h3>
          <div class="info-panel">
            <strong>OC — solo lectura</strong><br />
            MP-12345 · Proveedor: 76.123.456-7 · Monto: $ 1.240.000
          </div>

          <div class="form-row">
            <label>Fecha recepción <span class="required">*</span></label>
            <input type="date" value="2026-07-15" />
          </div>
          <div class="form-row form-row--readonly">
            <label>Recibido por</label>
            Ana Pérez (usuario actual)
          </div>
          <div class="form-row">
            <label>Conformidad <span class="required">*</span></label>
            <label style="font-weight:normal;margin-right:16px;">
              <input type="radio" name="conformity" value="conforme" checked style="width:auto;display:inline-block;margin-right:6px;" />
              Conforme
            </label>
            <label style="font-weight:normal;">
              <input type="radio" name="conformity" value="no_conforme" style="width:auto;display:inline-block;margin-right:6px;" />
              No conforme
            </label>
          </div>
          <div class="form-row">
            <label>Observaciones (obligatorio si no conforme)</label>
            <textarea id="observations" placeholder="Detalle del rechazo o reservas…"></textarea>
          </div>
        </section>

        <section class="form-section">
          <h3 class="form-section__title">Líneas recibidas</h3>
          <table class="form-table">
            <thead>
              <tr>
                <th>Ítem OC</th>
                <th>Cant. OC</th>
                <th>Cant. recibida <span class="required">*</span></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Producto A</td>
                <td>10</td>
                <td><input type="number" value="10" /></td>
              </tr>
            </tbody>
          </table>
        </section>

        <section class="form-section">
          <h3 class="form-section__title">Documentos adjuntos</h3>
          <div class="form-row">
            <label>Documentos adjuntos <span class="required">*</span></label>
            <button class="btn btn--secondary" type="button">Factura electrónica</button>
            <button class="btn btn--secondary" type="button">Guía despacho</button>
            <button class="btn btn--secondary" type="button">+ Subir</button>
          </div>
        </section>
      </div>
      <div class="form-actions">
        <button class="btn btn--secondary" type="button" id="draft">Guardar borrador</button>
        <button class="btn btn--primary" type="button" id="confirm">Confirmar recepción</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, demoAction, initStepSimulation } from '../../../shared/form-shell.js';
    import { bootstrapFormPage } from '../../../shared/form-bootstrap.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();
    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 4 · Recepción Conforme',
      stepName: 'Registro de la recepción',
      stepId: '4.1',
    });
    initStepSimulation({ stepId: '4.1' });

    bootstrapFormPage('recepcion');

    document.querySelectorAll('input[name="conformity"]').forEach((radio) => {
      radio.addEventListener('change', () => {
        const noConforme = document.querySelector('input[name="conformity"]:checked').value === 'no_conforme';
        document.getElementById('observations').placeholder = noConforme
          ? 'Obligatorio: detalle del rechazo o reservas…'
          : 'Detalle del rechazo o reservas…';
      });
    });

    document.getElementById('draft').addEventListener('click', () => demoAction('createGoodsReceipt'));
    document.getElementById('confirm').addEventListener('click', () => {
      const noConforme = document.querySelector('input[name="conformity"]:checked').value === 'no_conforme';
      if (noConforme && !document.getElementById('observations').value.trim()) {
        alert('Observaciones obligatorias si no conforme (demo).');
        return;
      }
      demoAction('confirmGoodsReceipt');
      setTimeout(() => { window.location.href = getExpedienteUrl(expedienteId); }, 800);
    });
  </script>
</body>
</html>
