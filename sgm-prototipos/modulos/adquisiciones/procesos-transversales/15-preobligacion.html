<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1.6 — Preobligación presupuestaria</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>

    <div class="form-card">
      <div class="form-card__header">
        <span>SOLPED #1234 — Preobligación presupuestaria</span>
        <span class="badge">En curso</span>
      </div>
      <div class="form-card__body">
        <div class="form-row form-row--readonly">
          <label>CDP vigente</label>
          CDP-2026-00891 (firmado 26/06/26)
        </div>
        <div class="form-row">
          <label>Línea presupuestaria (solo lectura)</label>
          <select><option>22.01.03 — Insumos oficina</option></select>
        </div>
        <div class="form-row">
          <label>Monto preobligación <span class="required">*</span></label>
          <input type="text" value="1250000" />
        </div>
        <div class="form-row">
          <label>Año fiscal <span class="required">*</span></label>
          <input type="number" value="2026" />
        </div>

        <div class="info-panel">
          <strong>Registro contable</strong><br />
          Estado: pendiente / registrado<br />
          Ref. asiento: — / AS-2026-12345
        </div>
      </div>
      <div class="form-actions">
        <a class="btn btn--secondary" id="cancel-link" href="../00-expediente/index.html">Cancelar</a>
        <button class="btn btn--primary" type="button" id="submit">Generar preobligación</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, renderOriginBanner, demoAction } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();
    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 1 · SOLPED',
      stepName: 'Generación de preobligación',
      stepId: '1.6',
    });
    document.getElementById('origin-banner').innerHTML = renderOriginBanner({
      kind: 'module',
      label: 'Presupuestos',
      mode: 'dependencia',
    });
    document.getElementById('cancel-link').href = getExpedienteUrl(expedienteId);
    document.getElementById('submit').addEventListener('click', () => demoAction('createBudgetPreCommitment'));
  </script>
</body>
</html>
