<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expedientes — Adquisiciones</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <link rel="stylesheet" href="../../shared/layout.css" />
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page page--listado">
        <div id="breadcrumb"></div>
        <div class="page-header-row">
          <div>
            <h1>Expedientes de compra</h1>
            <p class="subtitle">Consulta transversal — filtros acumulables · wireframe 01</p>
          </div>
          <button type="button" class="btn btn--primary" id="btn-nuevo">Nuevo expediente</button>
        </div>

        <div class="demo-panel" id="demo-panel">
          <span class="badge badge--demo">Solo para demo</span>
          <label>
            Ver como:
            <select id="viewer-scope">
              <option value="daf" selected>Usuario DAF</option>
              <option value="solicitante">Unidad solicitante</option>
            </select>
          </label>
          <label class="list-check">
            <input type="checkbox" id="skip-precheck" />
            Omitir paso 1.0
            <span class="muted">(sin Inventario ni catálogo CM)</span>
          </label>
          <span class="list-hint" id="scope-hint"></span>
        </div>

        <div class="list-toolbar form-card">
          <div class="form-card__body list-toolbar__body">
            <div class="list-toolbar__row">
              <label class="list-field list-field--grow">
                Buscar <span class="muted">(opcional)</span>
                <input
                  type="search"
                  id="filter-q"
                  placeholder="Folio, glosa o modalidad"
                  autocomplete="off"
                />
              </label>
              <label class="list-field" id="dept-field">
                Departamento solicitante <span class="muted">(opcional)</span>
                <select id="filter-department">
                  <option value="">Todos</option>
                </select>
              </label>
              <label class="list-field">
                Modalidad <span class="muted">(opcional)</span>
                <select id="filter-modality">
                  <option value="">Todas</option>
                  <option value="agile_purchase">Compra Ágil</option>
                  <option value="framework_agreement">Convenio Marco</option>
                  <option value="public_tender">Licitación Pública</option>
                  <option value="direct_procurement">Trato Directo</option>
                </select>
              </label>
            </div>
            <div class="list-toolbar__row list-toolbar__row--checks">
              <label class="list-check">
                <input type="checkbox" id="filter-active" />
                Proceso activo
              </label>
              <label class="list-check">
                <input type="checkbox" id="filter-awaiting" />
                Por firmar / aprobar
              </label>
              <button type="button" class="btn btn--secondary" id="btn-clear">Limpiar filtros</button>
            </div>
          </div>
        </div>

        <p class="list-count" id="list-count" aria-live="polite"></p>

        <div class="form-card">
          <div class="form-card__body" style="padding:0;">
            <table class="expedientes-table">
              <thead>
                <tr>
                  <th class="th-sortable" data-sort="folio" scope="col" tabindex="0" role="columnheader" aria-sort="none">Folio</th>
                  <th class="th-sortable" data-sort="created_at" scope="col" tabindex="0" role="columnheader" aria-sort="none">Creación</th>
                  <th class="th-sortable" data-sort="description" scope="col" tabindex="0" role="columnheader" aria-sort="none">Glosa</th>
                  <th class="th-sortable" data-sort="requesting_department" scope="col" tabindex="0" role="columnheader" aria-sort="none">Departamento</th>
                  <th class="th-sortable" data-sort="procurement_type" scope="col" tabindex="0" role="columnheader" aria-sort="none">Modalidad</th>
                  <th class="th-sortable" data-sort="status" scope="col" tabindex="0" role="columnheader" aria-sort="none">Estado</th>
                  <th class="th-sortable" data-sort="amount" scope="col" tabindex="0" role="columnheader" aria-sort="none" title="Adjudicado si existe; si no, solicitado">Monto</th>
                </tr>
              </thead>
              <tbody id="expedientes-tbody"></tbody>
            </table>
            <p class="list-empty" id="list-empty" hidden>No hay expedientes con estos criterios</p>
          </div>
        </div>

        <div class="list-pager" id="list-pager" hidden>
          <button type="button" class="btn btn--secondary" id="btn-prev-page">Anterior</button>
          <button type="button" class="btn btn--secondary" id="btn-next-page">Siguiente</button>
        </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>
  <script type="module">
    import { initAppShell, renderAdqBreadcrumb, siteUrl } from '../../shared/app-shell.js';
    import {
      expedientesDemo,
      DEMO_SOLICITANTE_UNIT_ID,
      displayAmount,
      formatClp,
      formatCreatedAt,
      getExpedienteDetailUrl,
      listDepartmentsFromDemo,
      statusLabel,
    } from '../../shared/expedientes-demo.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    document.getElementById('breadcrumb').innerHTML = renderAdqBreadcrumb({
      items: [
        { label: 'Adquisiciones', href: 'modulos/adquisiciones/index.html' },
        { label: 'Expedientes' },
      ],
    });

    const PAGE_SIZE = 50;
    const SORT_KEYS = {
      folio: (e) => e.id,
      created_at: (e) => e.createdAt || '',
      description: (e) => e.glosa,
      requesting_department: (e) => e.department,
      procurement_type: (e) => e.modality,
      status: (e) => e.status,
      amount: (e) => {
        const shown = displayAmount(e);
        return shown ? shown.value : -1;
      },
    };

    const state = {
      page: 1,
      sort: 'folio',
      order: 'asc',
    };

    const els = {
      viewer: document.getElementById('viewer-scope'),
      scopeHint: document.getElementById('scope-hint'),
      skipPrecheck: document.getElementById('skip-precheck'),
      nuevo: document.getElementById('btn-nuevo'),
      q: document.getElementById('filter-q'),
      department: document.getElementById('filter-department'),
      deptField: document.getElementById('dept-field'),
      modality: document.getElementById('filter-modality'),
      active: document.getElementById('filter-active'),
      awaiting: document.getElementById('filter-awaiting'),
      clear: document.getElementById('btn-clear'),
      tbody: document.getElementById('expedientes-tbody'),
      count: document.getElementById('list-count'),
      empty: document.getElementById('list-empty'),
      pager: document.getElementById('list-pager'),
      prevPage: document.getElementById('btn-prev-page'),
      nextPage: document.getElementById('btn-next-page'),
    };

    for (const d of listDepartmentsFromDemo()) {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.name;
      els.department.appendChild(opt);
    }

    function scopedBase() {
      const scope = els.viewer.value;
      if (scope === 'solicitante') {
        return expedientesDemo.filter((e) => e.unitId === DEMO_SOLICITANTE_UNIT_ID);
      }
      return expedientesDemo.slice();
    }

    function matchesQuery(exp, q) {
      if (!q) return true;
      const hay = [exp.id, exp.glosa, exp.modality].join(' ').toLowerCase();
      return hay.includes(q);
    }

    function applyFilters(rows) {
      const q = els.q.value.trim().toLowerCase();
      const dept = els.department.value;
      const modality = els.modality.value;
      const onlyActive = els.active.checked;
      const onlyAwaiting = els.awaiting.checked;
      const isSolicitante = els.viewer.value === 'solicitante';

      return rows.filter((exp) => {
        if (!matchesQuery(exp, q)) return false;
        if (!isSolicitante && dept && exp.departmentId !== dept) return false;
        if (modality && exp.modalityKey !== modality) return false;
        if (onlyActive && exp.status !== 'in_progress') return false;
        if (onlyAwaiting && !exp.awaitingMyAction) return false;
        return true;
      });
    }

    function compareValues(a, b) {
      if (typeof a === 'number' && typeof b === 'number') return a - b;
      return String(a).localeCompare(String(b), 'es', { sensitivity: 'base', numeric: true });
    }

    function applySort(rows) {
      const getter = SORT_KEYS[state.sort] || SORT_KEYS.folio;
      const dir = state.order === 'desc' ? -1 : 1;
      return rows.slice().sort((left, right) => dir * compareValues(getter(left), getter(right)));
    }

    function updateScopeUi() {
      const isSolicitante = els.viewer.value === 'solicitante';
      els.deptField.hidden = isSolicitante;
      if (isSolicitante) els.department.value = '';
      els.scopeHint.textContent = isSolicitante
        ? 'Solo expedientes de su unidad (adq.solicitante / adq.aprobador_unidad).'
        : 'Todos los expedientes del tenant (roles DAF / lectura amplia).';
    }

    function updateSortHeaders() {
      document.querySelectorAll('.expedientes-table th.th-sortable').forEach((th) => {
        const key = th.dataset.sort;
        if (key === state.sort) {
          th.setAttribute('aria-sort', state.order === 'asc' ? 'ascending' : 'descending');
        } else {
          th.setAttribute('aria-sort', 'none');
        }
      });
    }

    function render() {
      updateScopeUi();
      updateSortHeaders();
      const base = scopedBase();
      const filtered = applySort(applyFilters(base));
      const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * PAGE_SIZE;
      const pageRows = filtered.slice(start, start + PAGE_SIZE);
      const from = filtered.length === 0 ? 0 : start + 1;
      const to = start + pageRows.length;

      els.count.textContent =
        filtered.length === 0
          ? `Mostrando 0 de ${base.length}`
          : `Mostrando ${from}–${to} de ${filtered.length} (página ${state.page} de ${totalPages}; máx. ${PAGE_SIZE} por página) · alcance ${base.length}`;
      els.empty.hidden = filtered.length > 0;
      els.pager.hidden = filtered.length <= PAGE_SIZE;
      els.prevPage.disabled = state.page <= 1;
      els.nextPage.disabled = state.page >= totalPages;

      els.tbody.innerHTML = pageRows
        .map((exp) => {
          const stubBadge = exp.fullDetail
            ? ''
            : '<span class="badge badge--stub">Solo listado · sin contenido</span>';
          const shown = displayAmount(exp);
          let montoCell = '—';
          if (shown) {
            const kindLabel = shown.kind === 'awarded' ? 'Adjudicado' : 'Solicitado';
            montoCell = `<span class="amount-cell">${formatClp(shown.value)}</span> <span class="amount-kind">${kindLabel}</span>`;
          }
          const navAttrs = exp.fullDetail
            ? `data-href="${siteUrl(getExpedienteDetailUrl(exp.id))}" tabindex="0" role="link"`
            : 'class="row--stub" title="Sin detalle demo"';
          return `
        <tr ${navAttrs}>
          <td class="folio-cell">${exp.id}</td>
          <td class="date-cell">${formatCreatedAt(exp.createdAt)}</td>
          <td>${exp.glosa} ${stubBadge}</td>
          <td>${exp.department}</td>
          <td>${exp.modality}</td>
          <td><span class="badge">${statusLabel(exp.status)}</span></td>
          <td class="amount-td">${montoCell}</td>
        </tr>`;
        })
        .join('');

      els.tbody.querySelectorAll('tr[data-href]').forEach((row) => {
        const go = () => {
          window.location.href = row.dataset.href;
        };
        row.addEventListener('click', go);
        row.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            go();
          }
        });
      });
    }

    function resetPageAndRender() {
      state.page = 1;
      render();
    }

    function toggleSort(sortKey) {
      if (state.sort === sortKey) {
        state.order = state.order === 'asc' ? 'desc' : 'asc';
      } else {
        state.sort = sortKey;
        state.order = 'asc';
      }
      state.page = 1;
      render();
    }

    els.clear.addEventListener('click', () => {
      els.q.value = '';
      els.department.value = '';
      els.modality.value = '';
      els.active.checked = false;
      els.awaiting.checked = false;
      resetPageAndRender();
    });

    els.prevPage.addEventListener('click', () => {
      if (state.page > 1) {
        state.page -= 1;
        render();
      }
    });

    els.nextPage.addEventListener('click', () => {
      state.page += 1;
      render();
    });

    document.querySelectorAll('.expedientes-table th.th-sortable').forEach((th) => {
      const activate = () => toggleSort(th.dataset.sort);
      th.addEventListener('click', activate);
      th.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          activate();
        }
      });
    });

    els.nuevo.addEventListener('click', () => {
      if (els.skipPrecheck.checked) {
        window.location.href = siteUrl(
          'modulos/adquisiciones/procesos-transversales/11-creacion-solped.html',
        );
      } else {
        window.location.href = siteUrl(
          'modulos/adquisiciones/procesos-transversales/10-verificacion-previa.html',
        );
      }
    });

    ['change', 'input'].forEach((evt) => {
      els.viewer.addEventListener(evt, resetPageAndRender);
      els.q.addEventListener(evt, resetPageAndRender);
      els.department.addEventListener(evt, resetPageAndRender);
      els.modality.addEventListener(evt, resetPageAndRender);
      els.active.addEventListener(evt, resetPageAndRender);
      els.awaiting.addEventListener(evt, resetPageAndRender);
    });

    const modalityFromUrl = new URLSearchParams(window.location.search).get('modality');
    const allowedModalities = [
      'agile_purchase',
      'framework_agreement',
      'public_tender',
      'direct_procurement',
    ];
    if (modalityFromUrl && allowedModalities.includes(modalityFromUrl)) {
      els.modality.value = modalityFromUrl;
    }

    render();
  </script>
</body>
</html>
