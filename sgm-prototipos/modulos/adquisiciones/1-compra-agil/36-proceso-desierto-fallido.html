<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.6 — Proceso desierto o fallido</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>

    <div class="form-card">
      <div class="form-card__header">
        <span>SOLPED #1234 — Proceso desierto o fallido</span>
        <span class="badge badge--active">Pendiente</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Motivo del fallo</h3>
          <div class="info-panel">
            <strong>Motivo — solo lectura</strong><br />
            <label><input type="radio" name="cause" value="deserted" style="width:auto;display:inline-block;margin-right:6px;" checked />Desierto (nadie cotizó)</label>
            <label><input type="radio" name="cause" value="all_rejected" style="width:auto;display:inline-block;margin-right:6px;" />Todas las ofertas rechazadas/inhábiles</label>
          </div>
        </section>

        <section class="form-section">
          <h3 class="form-section__title">Decisión <span class="required">*</span></h3>
          <div class="form-row">
            <label><input type="radio" name="decision" value="republish" style="width:auto;display:inline-block;margin-right:6px;" checked />Republicar (nueva cotización en MP, re-vinculación 2.3)</label>
            <label><input type="radio" name="decision" value="reassess" style="width:auto;display:inline-block;margin-right:6px;" />Reevaluar (reversión formal a etapa 2 — nueva ModalityDecision)</label>
            <label><input type="radio" name="decision" value="cancel" style="width:auto;display:inline-block;margin-right:6px;" />Cancelar expediente (libera preobligación completa)</label>
          </div>

          <div class="banner hidden" id="result-banner"></div>

          <div class="info-panel hidden" id="next-step-panel">
            <span id="next-step-text"></span>
            <a class="btn btn--primary" id="next-step-link" href="#" style="margin-left:8px;">Continuar</a>
          </div>
        </section>
      </div>
      <div class="form-actions">
        <span></span>
        <button class="btn btn--primary" type="button" id="confirm">Confirmar decisión</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, getExpedienteUrl, renderBreadcrumb, demoAction, relativeFormHref, initStepSimulation } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra',
      stepName: 'Proceso desierto o fallido',
      stepId: '3.6',
    });
    initStepSimulation({ stepId: '3.6' });

    const resultBanner = document.getElementById('result-banner');
    const nextStepPanel = document.getElementById('next-step-panel');
    const nextStepText = document.getElementById('next-step-text');
    const nextStepLink = document.getElementById('next-step-link');

    document.getElementById('confirm').addEventListener('click', () => {
      const decision = document.querySelector('input[name="decision"]:checked').value;
      resultBanner.classList.remove('hidden');
      resultBanner.style.color = '';
      resultBanner.className = 'banner';

      if (decision === 'republish') {
        resultBanner.classList.add('banner--info');
        resultBanner.textContent = 'Republicando — nueva cotización en Mercado Público.';
        nextStepText.textContent = 'Continúe a la vinculación con Mercado Público (2.3) para el nuevo proceso.';
        nextStepLink.textContent = 'Continuar a 2.3';
        nextStepLink.href = relativeFormHref('../procesos-transversales/23-vinculacion-mp.html');
        nextStepPanel.classList.remove('hidden');
        document.getElementById('confirm').disabled = true;
        document.querySelectorAll('input[name="decision"]').forEach((el) => { el.disabled = true; });
      } else if (decision === 'reassess') {
        resultBanner.style.color = '#8c6d1f';
        resultBanner.innerHTML = 'Procedimiento de reversión formal a etapa 2 aún no definido — <a href="../../../../sgm-docs/arquitectura/decisiones/pendientes.md" target="_blank" rel="noopener">PENDIENTE P-34</a>. No se puede ejecutar en este prototipo.';
      } else {
        demoAction('releasePreCommitment');
        resultBanner.classList.add('banner--info');
        resultBanner.textContent = 'Expediente cancelado — preobligación liberada al 100%. Notificando a la unidad solicitante.';
        nextStepText.textContent = '';
        nextStepLink.textContent = 'Volver al expediente';
        nextStepLink.href = getExpedienteUrl(expedienteId);
        nextStepPanel.classList.remove('hidden');
        document.getElementById('confirm').disabled = true;
        document.querySelectorAll('input[name="decision"]').forEach((el) => { el.disabled = true; });
      }
    });
  </script>
</body>
</html>
