<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.4 — Toma de Razón de las bases (Contraloría)</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00045 — Toma de Razón de las bases</span>
        <span class="badge badge--active" id="header-badge">Condicional</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Envío a Contraloría</h3>
          <div class="info-panel">
            Umbral de Toma de Razón vigente: $ 150.000.000 (<code>NormativeParameter</code>) · Monto del proceso: $ 185.000.000 → Aplica Toma de Razón
          </div>
          <div id="submit-panel">
            <div class="form-row"><label>N° de oficio de envío <span class="required">*</span></label><input type="text" id="submission-ref" placeholder="Of. N° 210-2026" /></div>
            <div class="form-row"><label>Fecha de envío</label><input type="date" id="submission-date" /></div>
          </div>
          <div class="info-panel hidden" id="pending-panel">Estado: en tramitación en CGR… (típicamente semanas).</div>
        </section>

        <section class="form-section hidden" id="outcome-panel">
          <h3 class="form-section__title">Resultado de Contraloría</h3>
          <div class="form-row">
            <label>Resultado <span class="required">*</span></label>
            <select id="outcome">
              <option value="approved" selected>Toma razón</option>
              <option value="approved_with_remarks">Toma razón con alcance</option>
              <option value="rejected">Representación</option>
            </select>
          </div>
          <div class="form-row"><label>Oficio de respuesta (adjunto) <span class="required">*</span></label><input type="text" id="response-ref" placeholder="Of. resp. N° 340-2026" /></div>
        </section>

        <div class="banner hidden" id="result-banner"></div>
        <div class="info-panel hidden" id="next-step-panel">
          <span id="next-step-text"></span>
          <a class="btn btn--primary" id="next-step-link" href="#" style="margin-left:8px;">Continuar</a>
        </div>
      </div>
      <div class="form-actions">
        <span></span>
        <button class="btn btn--primary" type="button" id="submit-btn">Registrar envío a Contraloría</button>
        <button class="btn btn--primary hidden" type="button" id="outcome-btn">Registrar resultado</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, renderBreadcrumb, renderOriginBanner, demoAction, relativeFormHref } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra (LP)',
      stepName: 'Toma de Razón de las bases',
      stepId: '3.4',
    });
    document.getElementById('origin-banner').innerHTML = renderOriginBanner({
      kind: 'external',
      label: 'Contraloría',
      mode: 'registro manual',
    });

    const resultBanner = document.getElementById('result-banner');
    const nextStepPanel = document.getElementById('next-step-panel');
    const nextStepText = document.getElementById('next-step-text');
    const nextStepLink = document.getElementById('next-step-link');

    document.getElementById('submit-btn').addEventListener('click', () => {
      if (!document.getElementById('submission-ref').value.trim()) {
        alert('N° de oficio de envío obligatorio (demo).');
        return;
      }
      demoAction('submitToComptroller');
      document.getElementById('submit-panel').querySelectorAll('input').forEach((el) => { el.disabled = true; });
      document.getElementById('submit-btn').classList.add('hidden');
      document.getElementById('pending-panel').classList.remove('hidden');
      document.getElementById('outcome-panel').classList.remove('hidden');
      document.getElementById('outcome-btn').classList.remove('hidden');
    });

    document.getElementById('outcome-btn').addEventListener('click', () => {
      if (!document.getElementById('response-ref').value.trim()) {
        alert('Oficio de respuesta obligatorio para registrar el resultado (demo).');
        return;
      }
      demoAction('recordComptrollerOutcome');
      resultBanner.classList.remove('hidden');
      const outcome = document.getElementById('outcome').value;

      if (outcome === 'rejected') {
        resultBanner.className = 'banner';
        resultBanner.style.color = '#a33333';
        resultBanner.textContent = 'Representación — el acto de aprobación de bases se cae. Reversión trazada a 3.1; los CaseStep reflejan el reintento sin perder historia.';
        document.getElementById('header-badge').textContent = 'Representada';
        nextStepText.textContent = 'Vuelve a 3.1 (Elaboración de bases) para corregir y repetir el ciclo 3.1–3.3.';
        nextStepLink.href = relativeFormHref('31-elaboracion-bases.html');
      } else {
        resultBanner.className = 'banner banner--info';
        resultBanner.textContent = outcome === 'approved_with_remarks'
          ? 'Toma de razón con alcance — ComptrollerReview.outcome = approved_with_remarks.'
          : 'Toma de razón — ComptrollerReview.outcome = approved.';
        document.getElementById('header-badge').textContent = 'Tomada de razón';
        nextStepText.textContent = 'Continuar a 3.5 (Publicación en MP y vinculación).';
        nextStepLink.href = relativeFormHref('35-publicacion-vinculacion-mp.html');
      }
      document.getElementById('outcome-btn').disabled = true;
      document.getElementById('outcome').disabled = true;
      document.getElementById('response-ref').disabled = true;
      nextStepPanel.classList.remove('hidden');
    });
  </script>
</body>
</html>
