<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.1 — Elaboración de bases administrativas y técnicas</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00045 — Elaboración de bases administrativas y técnicas</span>
        <span class="badge badge--draft" id="header-badge">Borrador</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Datos de las bases</h3>
          <div class="form-row">
            <label>Bases técnicas (adjunto) <span class="required">*</span></label>
            <input type="text" id="technical-ref" placeholder="bases-tecnicas-v1.pdf" />
          </div>
          <div class="form-row">
            <label>Bases administrativas (adjunto) <span class="required">*</span></label>
            <input type="text" id="administrative-ref" placeholder="bases-admin-v1.pdf" />
          </div>
          <div class="form-row">
            <label>¿Exige Garantía de Seriedad?</label>
            <select id="requires-bid-bond">
              <option value="yes" selected>Sí</option>
              <option value="no">No</option>
            </select>
          </div>
          <div class="form-row" id="bid-bond-amount-row">
            <label>Monto mínimo Garantía de Seriedad</label>
            <input type="text" id="bid-bond-amount" value="1.850.000" />
          </div>
          <div class="form-row">
            <label>¿Exige Garantía de Fiel Cumplimiento?</label>
            <select id="requires-performance-bond">
              <option value="yes" selected>Sí</option>
              <option value="no">No</option>
            </select>
          </div>
          <div class="form-row" id="performance-bond-amount-row">
            <label>Monto mínimo Garantía de Fiel Cumplimiento</label>
            <input type="text" id="performance-bond-amount" value="9.250.000" />
          </div>
        </section>

        <section class="form-section">
          <h3 class="form-section__title">Criterios de evaluación (EvaluationCriterion)</h3>
          <table class="form-table" id="criteria-table">
            <thead>
              <tr><th>Nombre</th><th>Ponderación %</th><th>Regla de puntuación</th></tr>
            </thead>
            <tbody>
              <tr><td><input type="text" class="crit-name" value="Precio" /></td><td><input type="number" class="crit-weight" value="40" /></td><td><input type="text" class="crit-rule" value="Menor precio = 100 pts" /></td></tr>
              <tr><td><input type="text" class="crit-name" value="Experiencia" /></td><td><input type="number" class="crit-weight" value="30" /></td><td><input type="text" class="crit-rule" value="Escala 1-5" /></td></tr>
              <tr><td><input type="text" class="crit-name" value="Plazo de entrega" /></td><td><input type="number" class="crit-weight" value="30" /></td><td><input type="text" class="crit-rule" value="Escala 1-5" /></td></tr>
            </tbody>
          </table>
          <button class="btn btn--secondary" type="button" id="add-criterion">+ Agregar criterio</button>
          <div class="info-panel" id="weight-sum-panel">Suma de ponderaciones: <span id="weight-sum">100</span> %</div>
        </section>

        <div class="banner hidden" id="result-banner"></div>

        <div class="info-panel hidden" id="next-step-panel">
          Bases en revisión jurídica. <a class="btn btn--primary" id="next-step-link" href="#" style="margin-left:8px;">Continuar a 3.2</a>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn--secondary" type="button" id="save-draft">Guardar borrador</button>
        <button class="btn btn--primary" type="button" id="submit-review">Enviar a revisión jurídica</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, renderBreadcrumb, renderOriginBanner, demoAction, relativeFormHref, initStepSimulation } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra (LP)',
      stepName: 'Elaboración de bases administrativas y técnicas',
      stepId: '3.1',
    });
    initStepSimulation({ stepId: '3.1' });
    document.getElementById('origin-banner').innerHTML = '';

    function toggleAmountRow(selectId, rowId) {
      const select = document.getElementById(selectId);
      const row = document.getElementById(rowId);
      const update = () => row.classList.toggle('hidden', select.value !== 'yes');
      select.addEventListener('change', update);
      update();
    }
    toggleAmountRow('requires-bid-bond', 'bid-bond-amount-row');
    toggleAmountRow('requires-performance-bond', 'performance-bond-amount-row');

    const weightSumEl = document.getElementById('weight-sum');
    const weightSumPanel = document.getElementById('weight-sum-panel');
    function recalcWeights() {
      const weights = [...document.querySelectorAll('.crit-weight')].map((el) => Number(el.value) || 0);
      const sum = weights.reduce((a, b) => a + b, 0);
      weightSumEl.textContent = sum;
      weightSumPanel.classList.toggle('info-panel--warning', sum !== 100);
      weightSumPanel.classList.toggle('info-panel--ok', sum === 100);
      return sum;
    }
    document.getElementById('criteria-table').addEventListener('input', recalcWeights);
    recalcWeights();

    document.getElementById('add-criterion').addEventListener('click', () => {
      const tbody = document.querySelector('#criteria-table tbody');
      const tr = document.createElement('tr');
      tr.innerHTML = '<td><input type="text" class="crit-name" value="" /></td><td><input type="number" class="crit-weight" value="0" /></td><td><input type="text" class="crit-rule" value="" /></td>';
      tbody.appendChild(tr);
      recalcWeights();
    });

    const resultBanner = document.getElementById('result-banner');
    const nextStepPanel = document.getElementById('next-step-panel');
    document.getElementById('next-step-link').href = relativeFormHref('32-revision-juridica-bases.html');

    document.getElementById('save-draft').addEventListener('click', () => {
      if (!document.getElementById('technical-ref').value.trim() || !document.getElementById('administrative-ref').value.trim()) {
        alert('Bases técnicas y administrativas obligatorias (demo).');
        return;
      }
      demoAction('createTenderBases');
      resultBanner.classList.remove('hidden');
      resultBanner.className = 'banner banner--info';
      resultBanner.textContent = 'Borrador guardado — TenderBases.status = draft.';
    });

    document.getElementById('submit-review').addEventListener('click', () => {
      const sum = recalcWeights();
      if (sum !== 100) {
        alert('CRITERIA_WEIGHTS_INVALID — la suma de ponderaciones debe ser 100% (demo).');
        return;
      }
      demoAction('submitBasesForLegalReview');
      resultBanner.classList.remove('hidden');
      resultBanner.className = 'banner banner--info';
      resultBanner.textContent = 'Bases enviadas a revisión jurídica — TenderBases.status = legal_review.';
      document.getElementById('header-badge').textContent = 'En revisión jurídica';
      nextStepPanel.classList.remove('hidden');
    });
  </script>
</body>
</html>
