<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3.8 — Acto de apertura electrónica</title>
  <link rel="stylesheet" href="../../../shared/tokens.css" />
  <link rel="stylesheet" href="../../../shared/layout.css" />
  <link rel="stylesheet" href="../../../shared/shell.css" />
  <link rel="stylesheet" href="../../../shared/origin.css" />
  <link rel="stylesheet" href="../../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
    <div id="breadcrumb"></div>
    <div id="origin-banner"></div>

    <div class="banner banner--info">Rol N/A: ocurre en Mercado Público, SGM en modo monitor — sin acción de usuario.</div>

    <div class="form-card">
      <div class="form-card__header">
        <span>ADQ-2026-00045 — Acto de apertura electrónica</span>
        <span class="badge badge--active" id="header-badge">En espera</span>
      </div>
      <div class="form-card__body">
        <section class="form-section">
          <h3 class="form-section__title">Apertura electrónica</h3>
          <div class="info-panel">
            Cierre de recepción de ofertas: 20-04-2026 10:00<br />
            Apertura electrónica: pendiente…
          </div>

          <div class="form-row">
            <label>Simular lectura MP <em>(solo demo — no existe en la ficha)</em></label>
            <select id="simulate-result">
              <option value="ok" selected>Apertura realizada — 4 ofertas</option>
            </select>
          </div>
        </section>

        <div class="banner hidden" id="result-banner"></div>
        <div class="info-panel hidden" id="next-step-panel">
          <span id="next-step-text"></span>
          <a class="btn btn--primary" id="next-step-link" href="#" style="margin-left:8px;">Continuar a 3.9</a>
        </div>
      </div>
      <div class="form-actions">
        <span></span>
        <button class="btn btn--primary" type="button" id="consult">Consultar</button>
      </div>
    </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>

  <script type="module">
    import { initAppShell } from '../../../shared/app-shell.js';
    import { getExpedienteId, renderBreadcrumb, renderOriginBanner, demoAction, relativeFormHref } from '../../../shared/form-shell.js';

    initAppShell({ activeModule: 'adquisiciones', activeNav: 'expedientes' });

    const expedienteId = getExpedienteId();

    document.getElementById('breadcrumb').innerHTML = renderBreadcrumb({
      expedienteId,
      stageName: 'Etapa 3 · Resolución de Compra (LP)',
      stepName: 'Acto de apertura electrónica',
      stepId: '3.8',
    });
    document.getElementById('origin-banner').innerHTML = renderOriginBanner({
      kind: 'external',
      label: 'Mercado Público',
      mode: 'solo lectura',
    });

    const resultBanner = document.getElementById('result-banner');
    const nextStepPanel = document.getElementById('next-step-panel');
    document.getElementById('next-step-link').href = relativeFormHref('39-comision-evaluadora.html');

    document.getElementById('consult').addEventListener('click', () => {
      demoAction('readMpProcess');
      resultBanner.classList.remove('hidden');
      resultBanner.className = 'banner banner--info';
      resultBanner.textContent = 'Apertura reflejada — 4 ofertas recibidas. Evento BidOpeningRecorded.';
      document.getElementById('header-badge').textContent = 'Apertura realizada';
      document.getElementById('consult').disabled = true;
      nextStepPanel.classList.remove('hidden');
    });
  </script>
</body>
</html>
