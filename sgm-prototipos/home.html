<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home — SGM</title>
  <link rel="stylesheet" href="shared/landing.css" />
</head>
<body class="home-body">
  <div class="home-redirect">
    <h1>Bienvenida</h1>
    <p id="msg">Entrando a tu bandeja de entrada…</p>
  </div>

  <script type="module">
    import { siteUrl } from './shared/app-shell.js';
    import { getSession, isLoggedIn } from './shared/auth-demo.js';

    if (!isLoggedIn()) {
      window.location.replace(siteUrl('auth/clave-unica.html'));
    } else {
      const session = getSession();
      const name = session?.user?.display_name || 'usuario';
      document.getElementById('msg').textContent =
        `Hola, ${name}. Abriendo tu bandeja de entrada…`;
      window.setTimeout(() => {
        window.location.replace(siteUrl('plataforma/shell/02-bandeja.html'));
      }, 700);
    }
  </script>
</body>
</html>
