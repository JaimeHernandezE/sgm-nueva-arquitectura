<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes M2M — Consola SUBDERE</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <link rel="stylesheet" href="../../shared/layout.css" />
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
        <div id="breadcrumb"></div>
        <div class="form-card">
          <div class="form-card__header">
            <span>Clientes M2M (ApiClient)</span>
            <button class="btn btn--primary" type="button" id="btn-emit">+ Emitir</button>
          </div>
          <div class="form-card__body">
            <table class="form-table" id="clients-table">
              <thead>
                <tr><th>Nombre</th><th>Scopes</th><th>Estado</th></tr>
              </thead>
              <tbody></tbody>
            </table>
            <div id="emit-panel" hidden style="margin-top:20px;">
              <h3 style="font-size:14px;margin:0 0 12px;">Nuevo cliente M2M</h3>
              <div class="form-row">
                <label>Nombre <span class="required">*</span></label>
                <input type="text" id="c-name" placeholder="Nombre del cliente" />
              </div>
              <div class="form-row">
                <label>Scopes <span class="required">*</span></label>
                <input type="text" id="c-scopes" value="adquisiciones.read" />
              </div>
              <div class="form-row">
                <label>Tenants <span class="required">*</span></label>
                <select id="c-tenants">
                  <option>Mun. Alpha</option>
                  <option>Mun. Beta</option>
                </select>
              </div>
              <div class="banner banner--info" id="secret-banner" hidden>
                client_secret mostrado una sola vez: <code>sk_demo_••••••••</code>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn--secondary" type="button" id="btn-rotate">Rotar secreto</button>
            <button class="btn btn--secondary" type="button" id="btn-revoke">Revocar</button>
            <button class="btn btn--primary" type="button" id="btn-create">Emitir</button>
          </div>
        </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>
  <script type="module">
    import { initAppShell, renderPlataformaBreadcrumb } from '../../shared/app-shell.js';
    import { demoAction } from '../../shared/form-shell.js';
    import { apiClients } from '../../shared/demo-data/plataforma.js';

    initAppShell({ activeModule: 'plataforma', console: 'subdere', activeNav: '03-m2m' });
    document.getElementById('breadcrumb').innerHTML = renderPlataformaBreadcrumb({
      consoleLabel: 'Consola SUBDERE',
      screenLabel: 'Clientes M2M',
    });

    document.querySelector('#clients-table tbody').innerHTML = apiClients
      .map(
        (c) => `<tr>
          <td>${c.name}</td>
          <td>${c.scopes.join(', ')}</td>
          <td><span class="badge badge--active">${c.status}</span></td>
        </tr>`,
      )
      .join('');

    document.getElementById('btn-emit').addEventListener('click', () => {
      document.getElementById('emit-panel').hidden = false;
    });
    document.getElementById('btn-create').addEventListener('click', () => {
      document.getElementById('secret-banner').hidden = false;
      demoAction('createApiClient');
    });
    document.getElementById('btn-rotate').addEventListener('click', () => demoAction('rotateApiClientSecret'));
    document.getElementById('btn-revoke').addEventListener('click', () => {
      if (confirm('¿Revocar cliente?')) demoAction('revokeApiClient');
    });
  </script>
</body>
</html>
