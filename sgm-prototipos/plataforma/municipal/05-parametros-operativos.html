<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parámetros operativos — Consola municipal</title>
  <link rel="stylesheet" href="../../shared/tokens.css" />
  <link rel="stylesheet" href="../../shared/layout.css" />
  <link rel="stylesheet" href="../../shared/shell.css" />
  <link rel="stylesheet" href="../../shared/forms.css" />
</head>
<body>
  <div class="app-layout">
    <main class="app-main">
      <div class="page">
        <div id="breadcrumb"></div>
        <div class="form-card">
          <div class="form-card__header"><span>Parámetros operativos del municipio</span></div>
          <div class="form-card__body">
            <p class="subtitle">Catálogo permitido por plataforma (no valores normativos).</p>
            <table class="form-table" id="params-table">
              <thead>
                <tr><th>Clave</th><th>Valor actual</th><th>Defecto plataforma</th></tr>
              </thead>
              <tbody></tbody>
            </table>
            <h3 style="font-size:14px;margin:20px 0 12px;">Editar</h3>
            <div class="form-row">
              <label>Clave</label>
              <input type="text" id="p-key" value="perfil_recepcion" readonly />
            </div>
            <div class="form-row">
              <label>Valor <span class="required">*</span></label>
              <input type="text" id="p-value" value="estricto" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn--secondary" type="button" id="btn-default">Restaurar defecto plataforma</button>
            <button class="btn btn--primary" type="button" id="btn-save">Guardar</button>
          </div>
        </div>
      </div>
    </main>
    <aside class="app-sidebar" id="app-sidebar" aria-label="Módulos SGM"></aside>
  </div>
  <script type="module">
    import { initAppShell, renderPlataformaBreadcrumb } from '../../shared/app-shell.js';
    import { demoAction } from '../../shared/form-shell.js';
    import { tenantParameters } from '../../shared/demo-data/plataforma.js';

    initAppShell({ activeModule: 'plataforma', console: 'municipal', activeNav: '05-parametros' });
    document.getElementById('breadcrumb').innerHTML = renderPlataformaBreadcrumb({
      consoleLabel: 'Consola municipal',
      screenLabel: 'Parámetros operativos',
    });

    const tbody = document.querySelector('#params-table tbody');
    tbody.innerHTML = tenantParameters
      .map(
        (p) => `<tr data-key="${p.key}" data-value="${p.value}" style="cursor:pointer;">
          <td>${p.key}</td><td>${p.value}</td><td>${p.platform_default}</td>
        </tr>`,
      )
      .join('');

    tbody.addEventListener('click', (e) => {
      const tr = e.target.closest('tr[data-key]');
      if (!tr) return;
      document.getElementById('p-key').value = tr.dataset.key;
      document.getElementById('p-value').value = tr.dataset.value;
      demoAction('getTenantParameter (' + tr.dataset.key + ')');
    });

    document.getElementById('btn-save').addEventListener('click', () => demoAction('upsertTenantParameter'));
    document.getElementById('btn-default').addEventListener('click', () => demoAction('upsertTenantParameter (default)'));
  </script>
</body>
</html>
